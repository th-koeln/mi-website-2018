baseurl = "https://www.medieninformatik.th-koeln.de/"

title = "Medieninformatik an der TH Köln"

locale = "de-de"

sectionPagesMenu = "main"
summaryLength = 20
paginate = 5
paginatePath = "page"

# Enable comments by entering your Disqus shortname
disqusShortname = ""

# Enable Google Analytics by entering your tracking code
googleAnalytics = ""

[markup.goldmark.renderer]
unsafe= true

[params]
  baseFragment = "/"
  template = ""
  copyright = "Medieninformatik an der TH Köln"
  ansprechpartner = "Ansprechpartner für die Medieninformatik Website ist <a href=\"https://www.th-koeln.de/personen/christian.noss/\">Christian Noss</a>"
  impressum = "<a href=\"https://www.th-koeln.de/hochschule/impressum_8159.php\">Impressum</a>"

[taxonomies]
  paper = "papers"

[outputs]
  page = ["HTML", "JSON"]
  section = ["HTML", "JSON"]
  home = ["html", "JSON"]

[imaging]
  resampleFilter = "box"
  quality = 75
  anchor = "smart"

[minify]
  disable = true

# Modul-Dateien (mi-moduls-po4) nutzen `published: true/false` als Boolean.
# Hugo behandelt `published` per Default als Alias für publishDate (ein Datum)
# und bricht sonst mit einem Parse-Fehler ab. Daher hier aus allen Datumsfeldern
# entfernt — `published` bleibt dadurch ein normaler Parameter.
[frontmatter]
  date = ['date']
  lastmod = [':git', 'date']
  publishDate = ['date']
  expiryDate = ['expirydate', 'unpublishdate']

# Module-Mounts: bindet die Modulbeschreibungen aus dem mi-moduls-po4-Subtree ein.
# Ersetzt die früheren Symlinks (content/study/*-4.0/moduls), denen Hugo seit dem
# neuen Content-System (v0.146) nicht mehr folgt.
[module]
  [[module.mounts]]
    source = "content"
    target = "content"
  [[module.mounts]]
    source = "mi-moduls-po4/_modulbeschreibungen-master"
    target = "content/study/master-4.0/moduls"
  [[module.mounts]]
    source = "mi-moduls-po4/_modulbeschreibungen-bachelor"
    target = "content/study/bachelor-4.0/moduls"
